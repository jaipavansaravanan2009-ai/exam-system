<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f6f9; padding: 20px; }
        .card { background: white; padding: 15px; margin: 10px 0; border: 2px solid #1e3d59; border-radius: 8px; }
        .result-card { background: #eaf2f8; padding: 15px; margin: 10px 0; border-left: 5px solid #2e86c1; border-radius: 5px; }
        button { padding: 8px 12px; background: #c0392b; color: white; border: none; cursor: pointer; border-radius: 4px; margin-right: 5px;}
        .btn-green { background: #1e8449; }
        input { padding: 8px; margin-right: 10px; width: 250px; }
    </style>
</head>
<body>
    <h2>👑 Admin Dashboard</h2>
    <button onclick="logout()">Logout</button>
    <hr>
    
    <h3>📝 Create Exam</h3>
    <input type="text" id="title" placeholder="Exam Title">
    <button class="btn-green" onclick="createExam()">Create Exam</button>
    
    <hr>
    <div style="display: flex; gap: 40px;">
        <div style="flex: 1;">
            <h3>📚 All Exams</h3>
            <button class="btn-green" onclick="loadExams()" style="margin-bottom: 10px;">Refresh Exams</button>
            <div id="examList"></div>
        </div>

        <div style="flex: 1;">
            <h3>🏆 Student Results</h3>
            <button class="btn-green" onclick="loadResults()" style="margin-bottom: 10px;">Refresh Results</button>
            <div id="resultsList"></div>
        </div>
    </div>

    <script>
        const token = localStorage.getItem("adminToken");
        const BACKEND_URL = "https://exam-system-production-5def.up.railway.app"; // Double check this!

        if (!token) { window.location.href = "login.html"; }

        let selectedExamId = null;

        async function loadExams() {
            const res = await fetch(`${BACKEND_URL}/api/exams`, { headers: { "Authorization": `Bearer ${token}` } });
            const exams = await res.json();
            const list = document.getElementById("examList");
            list.innerHTML = "";
            exams.forEach(exam => {
                list.innerHTML += `
                    <div class="card">
                        <h4>${exam.title}</h4>
                        <p>Questions: ${exam.questions?.length || 0}</p>
                        <button class="btn-green" onclick="manageQuestions('${exam.id}', '${exam.title}')">Manage Questions ⚙️</button>
                        <button onclick="deleteExam('${exam.id}')">Delete Exam 🗑️</button>
                    </div>`;
            });
        }

        // Opens the question editor for a specific exam
        async function manageQuestions(id, title) {
            selectedExamId = id;
            const res = await fetch(`${BACKEND_URL}/api/exams`, { headers: { "Authorization": `Bearer ${token}` } });
            const exams = await res.json();
            const exam = exams.find(e => e.id === id);

            // Create a temporary overlay/modal for editing
            const modal = document.createElement("div");
            modal.id = "editorModal";
            modal.style = "position:fixed; top:0; left:0; width:100%; height:100%; background:white; overflow-y:auto; padding:20px; z-index:100;";
            
            let questionsHTML = exam.questions.map((q, index) => `
                <div style="border-bottom:1px solid #ccc; padding:10px;">
                    <p><b>Q${index+1}:</b> ${q.question}</p>
                    <button onclick="deleteQuestion('${id}', ${index})">Delete Q</button>
                </div>
            `).join("");

            modal.innerHTML = `
                <button onclick="document.getElementById('editorModal').remove()" style="background:black;">✖ Close Editor</button>
                <h2>Editing Exam: ${title}</h2>
                <div style="background:#f0f0f0; padding:15px; border-radius:8px;">
                    <h4>Add New Question</h4>
                    <input type="text" id="newQ" placeholder="Question Text" style="width:100%;"><br><br>
                    <input type="text" id="opt1" placeholder="Option 1">
                    <input type="text" id="opt2" placeholder="Option 2"><br><br>
                    <input type="text" id="opt3" placeholder="Option 3">
                    <input type="text" id="opt4" placeholder="Option 4"><br><br>
                    <input type="text" id="correct" placeholder="Correct Answer (Exact Match)">
                    <button class="btn-green" onclick="submitNewQuestion('${id}')">Save Question ✅</button>
                </div>
                <hr>
                <h3>Existing Questions</h3>
                ${questionsHTML || "<p>No questions added yet.</p>"}
            `;
            document.body.appendChild(modal);
        }

        async function submitNewQuestion(examId) {
            const question = document.getElementById("newQ").value;
            const options = [
                document.getElementById("opt1").value,
                document.getElementById("opt2").value,
                document.getElementById("opt3").value,
                document.getElementById("opt4").value
            ];
            const correctAnswer = document.getElementById("correct").value;

            await fetch(`${BACKEND_URL}/api/exams/${examId}/questions`, {
                method: "POST",
                headers: { "Content-Type": "application/json", "Authorization": `Bearer ${token}` },
                body: JSON.stringify({ question, options, correctAnswer })
            });
            
            document.getElementById("editorModal").remove();
            loadExams();
            manageQuestions(examId, "Updated Exam");
        }

        async function deleteQuestion(examId, index) {
            if(!confirm("Delete this question?")) return;
            await fetch(`${BACKEND_URL}/api/exams/${examId}/questions/${index}`, {
                method: "DELETE",
                headers: { "Authorization": `Bearer ${token}` }
            });
            document.getElementById("editorModal").remove();
            loadExams();
            manageQuestions(examId, "Updated Exam");
        }

        async function loadResults() {
            const res = await fetch(`${BACKEND_URL}/api/results`, { headers: { "Authorization": `Bearer ${token}` } });
            const results = await res.json();
            const list = document.getElementById("resultsList");
            list.innerHTML = "";
            results.sort((a,b) => b.score - a.score).forEach((r, i) => {
                list.innerHTML += `<div class="result-card"><b>#${i+1} ${r.studentName}</b>: ${r.score} marks (${r.examTitle})</div>`;
            });
        }

        loadExams();
        loadResults();
    </script>
</body>
</html>
