<!DOCTYPE html>
<html>
<head>
  <title>Admin Dashboard</title>
</head>
<body>

<h2>Admin Dashboard</h2>

<button onclick="logout()">Logout</button>

<hr>

<h3>Create Exam</h3>

<input type="text" id="title" placeholder="Exam Title">
<button onclick="createExam()">Create Exam</button>

<hr>

<h3>All Exams</h3>
<div id="examList"></div>

<script>
const token = localStorage.getItem("adminToken");

if (!token) {
  alert("Please login first 🚫");
  window.location.href = "login.html";
}

function logout() {
  localStorage.removeItem("adminToken");
  window.location.href = "login.html";
}

async function createExam() {
  const title = document.getElementById("title").value;

  const res = await fetch("https://exam-system-production-5def.up.railway.app/api/exams", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": `Bearer ${token}`
    },
    body: JSON.stringify({
      title: title,
      questions: []
    })
  });

  const data = await res.json();
  alert(data.message || data.error);
  loadExams();
}

async function loadExams() {
  try {
    const res = await fetch("https://exam-system-production-5def.up.railway.app/api/exams", {
      headers: {
        "Authorization": `Bearer ${token}`
      }
    });

    const exams = await res.json();
    console.log("Exams from backend:", exams); // DEBUG LINE

    const examList = document.getElementById("examList");
    examList.innerHTML = "";

    if (!exams.length) {
      examList.innerHTML = "<p>No exams found</p>";
      return;
    }

    exams.forEach(exam => {
        const card = document.createElement("div");
        card.style.border = "2px solid black";
        card.style.padding = "10px";
        card.style.margin = "10px";
        card.style.backgroundColor = "#f2f2f2";

        const title = document.createElement("h4");
        title.textContent = exam.title;

        const id = document.createElement("p");
        id.textContent = "ID: " + exam.id;

        const deleteBtn = document.createElement("button");
        deleteBtn.textContent = "Delete 🗑️";
        deleteBtn.onclick = () => deleteExam(exam.id);

        card.appendChild(title);
        card.appendChild(id);
        card.appendChild(deleteBtn);

        examList.appendChild(card);
    });

  } catch (error) {
    console.error("Error loading exams:", error);
  }
}

async function deleteExam(id) {
  const token = localStorage.getItem("adminToken");

  if (!confirm("Are you sure you want to delete this exam?")) return;

  try {
    const res = await fetch(
      `https://exam-system-production-5def.up.railway.app/api/exams/${id}`,
      {
        method: "DELETE",
        headers: {
          "Authorization": `Bearer ${token}`
        }
      }
    );

    const data = await res.json();
    alert(data.message || data.error);

    loadExams(); // refresh list

  } catch (error) {
    console.error(error);
  }
}

loadExams();
</script>

</body>
</html>
