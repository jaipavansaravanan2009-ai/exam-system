<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f6f9; padding: 20px; }
        .card { background: white; padding: 15px; margin: 10px 0; border: 2px solid #1e3d59; border-radius: 8px; }
        .result-card { background: #eaf2f8; padding: 15px; margin: 10px 0; border-left: 5px solid #2e86c1; border-radius: 5px; }
        button { padding: 8px 12px; background: #c0392b; color: white; border: none; cursor: pointer; border-radius: 4px; margin-right: 5px;}
        .btn-green { background: #1e8449; }
        input { padding: 8px; margin-right: 10px; width: 250px; }
    </style>
</head>
<body>
    <h2>👑 Admin Dashboard</h2>
    <button onclick="logout()">Logout</button>
    <hr>
    
    <h3>📝 Create Exam</h3>
    <input type="text" id="title" placeholder="Exam Title">
    <button class="btn-green" onclick="createExam()">Create Exam</button>
    
    <hr>
    <div style="display: flex; gap: 40px;">
        <div style="flex: 1;">
            <h3>📚 All Exams</h3>
            <button class="btn-green" onclick="loadExams()" style="margin-bottom: 10px;">Refresh Exams</button>
            <div id="examList"></div>
        </div>

        <div style="flex: 1;">
            <h3>🏆 Student Results</h3>
            <button class="btn-green" onclick="loadResults()" style="margin-bottom: 10px;">Refresh Results</button>
            <div id="resultsList"></div>
        </div>
    </div>

    <script>
        const token = localStorage.getItem("adminToken");
        // ⚠️ REPLACE WITH YOUR REAL RAILWAY URL
        const BACKEND_URL = "https://exam-system-production-5def.up.railway.app";

        if (!token) {
            alert("Please login first 🚫");
            window.location.href = "login.html";
        }

        function logout() {
            localStorage.removeItem("adminToken");
            window.location.href = "login.html";
        }

        async function createExam() {
            const title = document.getElementById("title").value;
            const res = await fetch(`${BACKEND_URL}/api/exams`, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": `Bearer ${token}`
                },
                body: JSON.stringify({ title: title, questions: [] })
            });
            const data = await res.json();
            alert(data.message || data.error);
            loadExams();
        }

        async function loadExams() {
            try {
                const res = await fetch(`${BACKEND_URL}/api/exams`, {
                    headers: { "Authorization": `Bearer ${token}` }
                });
                const exams = await res.json();
                const examList = document.getElementById("examList");
                examList.innerHTML = "";

                exams.forEach(exam => {
                    const card = document.createElement("div");
                    card.className = "card";
                    
                    const title = document.createElement("h4");
                    title.textContent = exam.title;
                    
                    const id = document.createElement("p");
                    id.textContent = "ID: " + exam.id;

                    const count = document.createElement("p");
                    count.textContent = "Questions: " + (exam.questions?.length || 0);
                    
                    const deleteBtn = document.createElement("button");
                    deleteBtn.textContent = "Delete 🗑️";
                    deleteBtn.onclick = () => deleteExam(exam.id);

                    const addQBtn = document.createElement("button");
                    addQBtn.className = "btn-green";
                    addQBtn.textContent = "Add Question ➕";
                    addQBtn.onclick = () => showQuestionForm(exam.id);
                    
                    card.appendChild(title);
                    card.appendChild(id);
                    card.appendChild(count);
                    card.appendChild(deleteBtn);
                    card.appendChild(addQBtn);
                    examList.appendChild(card);
                });
            } catch (error) {
                console.error("Error:", error);
            }
        }

        async function deleteExam(id) {
            if (!confirm("Are you sure you want to delete this exam?")) return;
            const res = await fetch(`${BACKEND_URL}/api/exams/${id}`, {
                method: "DELETE",
                headers: { "Authorization": `Bearer ${token}` }
            });
            const data = await res.json();
            alert(data.message || data.error);
            loadExams(); 
        }

        function showQuestionForm(examId) {
            const question = prompt("Enter Question:");
            if (!question) return;
            const opt1 = prompt("Option 1:");
            const opt2 = prompt("Option 2:");
            const opt3 = prompt("Option 3:");
            const opt4 = prompt("Option 4:");
            const correctAnswer = prompt("Enter correct answer exactly as one option:");

            addQuestion(examId, question, [opt1, opt2, opt3, opt4], correctAnswer);
        }

        async function addQuestion(examId, question, options, correctAnswer) {
            const res = await fetch(`${BACKEND_URL}/api/exams/${examId}/questions`, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": `Bearer ${token}`
                },
                body: JSON.stringify({ question, options, correctAnswer })
            });
            const data = await res.json();
            alert(data.message || data.error);
            loadExams();
        }

        // 🏆 NEW: Fetch Student Results
        async function loadResults() {
            try {
                const res = await fetch(`${BACKEND_URL}/api/results`, {
                    headers: { "Authorization": `Bearer ${token}` }
                });
                const results = await res.json();
                const resultsList = document.getElementById("resultsList");
                resultsList.innerHTML = "";

                if(results.length === 0){
                    resultsList.innerHTML = "<p>No results yet.</p>";
                    return;
                }

                // Sort by highest score automatically
                results.sort((a, b) => b.score - a.score);

                results.forEach((result, index) => {
                    resultsList.innerHTML += `
                    <div class="result-card">
                        <h4 style="margin:0 0 10px 0;">Rank #${index + 1}: ${result.studentName}</h4>
                        <p style="margin:5px 0;"><b>Exam:</b> ${result.examTitle}</p>
                        <p style="margin:5px 0;"><b>Score:</b> <span style="color:#1e8449; font-weight:bold;">${result.score} Marks</span></p>
                        <p style="margin:5px 0; font-size:14px;">Correct: ${result.correct} | Wrong: ${result.wrong}</p>
                    </div>
                    `;
                });
            } catch (error) {
                console.error("Error loading results:", error);
            }
        }

        loadExams();
        loadResults();
    </script>
</body>
</html>
