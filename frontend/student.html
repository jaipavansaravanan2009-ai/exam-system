<!DOCTYPE html>
<html>
<head>
    <title>JEE Mains Mock - Student Portal</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; background: #f0f2f5; display: flex; flex-direction: column; height: 100vh; }
        header { background: #1e3d59; color: white; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; }
        .main-container { display: flex; flex: 1; overflow: hidden; }
        
        /* Left Side: Question Area */
        .question-section { flex: 3; padding: 30px; overflow-y: auto; background: white; }
        
        /* Right Side: Palette Area */
        .sidebar { flex: 1; background: #e5e7e9; border-left: 2px solid #ccc; padding: 15px; display: flex; flex-direction: column; }
        
        .palette-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-top: 20px; }
        .palette-btn { width: 35px; height: 35px; border: 1px solid #999; display: flex; align-items: center; justify-content: center; cursor: pointer; background: white; border-radius: 4px; font-size: 12px; }
        .palette-btn.active { border: 2px solid #000; font-weight: bold; }
        .palette-btn.answered { background: #27ae60; color: white; } /* Green */
        .palette-btn.visited { background: #e74c3c; color: white; } /* Red */

        .controls { margin-top: 30px; display: flex; gap: 10px; }
        .btn { padding: 10px 20px; border: none; cursor: pointer; border-radius: 4px; font-weight: bold; }
        .btn-next { background: #2e86c1; color: white; }
        .btn-save { background: #27ae60; color: white; }
        #timer { font-size: 20px; font-weight: bold; background: #f39c12; padding: 5px 15px; border-radius: 5px; }
    </style>
</head>
<body>

<header>
    <div id="examTitleHeader">JEE Mock Exam</div>
    <div id="studentNameHeader">Student: Guest</div>
    <div id="timer">03:00:00</div>
</header>

<div class="main-container" id="examUI" style="display: none;">

    <div class="subject-bar" style="background: #e5e7e9; display: flex; border-bottom: 1px solid #ccc;">
    <button class="subj-btn active" onclick="switchSubject('Physics')">Physics</button>
    <button class="subj-btn" onclick="switchSubject('Chemistry')">Chemistry</button>
    <button class="subj-btn" onclick="switchSubject('Maths')">Maths</button>
</div>

<style>
    .subj-btn {
        padding: 10px 25px;
        border: none;
        background: white;
        cursor: pointer;
        font-weight: bold;
        border-right: 1px solid #ccc;
    }
    .subj-btn.active {
        background: #2e86c1;
        color: white;
    }

    /* Purple color for Mark for Review */
.palette-btn.review { 
    background: #8e44ad; 
    color: white; 
    border-radius: 50%; /* Circle shape */
}

/* Purple with a small green dot (Answered & Marked for Review) */
.palette-btn.review-answered { 
    background: #8e44ad; 
    color: white; 
    border-radius: 50%;
    position: relative;
}

.palette-btn.review-answered::after {
    content: '';
    position: absolute;
    bottom: 2px;
    right: 2px;
    width: 8px;
    height: 8px;
    background: #27ae60;
    border-radius: 50%;
    border: 1px solid white;
}
</style>

    <div class="question-section">
        <h3 id="qNumber">Question 1</h3>
        <hr>
        <div id="qText" style="font-size: 18px; margin: 20px 0;">Loading question...</div>
        <div id="optionsList"></div>
        
        <div class="controls">
            <button class="btn btn-save" onclick="saveAndNext()">Save & Next</button>
            <button class="btn" style="background:#95a5a6;" onclick="clearResponse()">Clear Response</button>
            <button class="btn" style="background:#95a5a6;" onclick="nextQuestion()">Next (Skip)</button> <button class="btn" style="background:#95a5a6;" onclick="clearResponse()">Clear Response</button>
            <button class="btn" style="background:#f1c40f;" onclick="submitFinal()">Submit Exam</button>
            <button class="btn" style="background: #8e44ad; color: white;" onclick="markForReview()">Mark for Review & Next</button>
        </div>
    </div>

    <div class="sidebar">
        <div style="text-align: center;">
            <div style="width: 80px; height: 80px; background: #ccc; margin: 0 auto; border-radius: 50%;"></div>
            <p id="paletteStudentName">Student Name</p>
        </div>
        <hr>
        <h4>Question Palette</h4>
        <div class="palette-grid" id="palette"></div>
    </div>
    <div style="margin-top: 20px; font-size: 12px; display: grid; grid-template-columns: 1fr 1fr; gap: 5px;">
    <div><span style="background:#27ae60; color:white; padding:2px 5px;">0</span> Answered</div>
    <div><span style="background:#e74c3c; color:white; padding:2px 5px;">0</span> Not Answered</div>
    <div><span style="background:#8e44ad; color:white; padding:2px 5px; border-radius:50%;">0</span> Review</div>
    <div><span style="background:white; border:1px solid #999; padding:2px 5px;">0</span> Not Visited</div>
</div>
</div>

<div id="setupBox" style="padding: 50px; text-align: center;">
    <h2>Welcome to JEE Mock Portal</h2>
    <input type="text" id="nameInput" placeholder="Enter Your Name" style="padding:10px; width: 250px;"><br><br>
    <div id="examSelect">Loading exams...</div>
</div>

<script>
    const BACKEND_URL = "https://exam-system-production-5def.up.railway.app"; 
    let currentSubject = 'Physics';
    let examData = null;
    let reviewStatus = {}; // { index: true/false }
    let studentAnswers = {}; // { index: answerValue }
    let currentIdx = 0;
    let timeLeft = 3 * 60 * 60; 

    async function loadExams() {
        const res = await fetch(`${BACKEND_URL}/api/public/exams`);
        const exams = await res.json();
        const div = document.getElementById("examSelect");
        div.innerHTML = exams.map(e => `
            <button class="btn btn-next" onclick="startExam('${e.id}')">Start ${e.title}</button>
        `).join("");
    }

    async function startExam(id) {
        const name = document.getElementById("nameInput").value;
        if(!name) return alert("Enter name!");

        const res = await fetch(`${BACKEND_URL}/api/public/exams/${id}`);
        examData = await res.json();

        document.getElementById("setupBox").style.display = "none";
        document.getElementById("examUI").style.display = "flex";
        document.getElementById("studentNameHeader").innerText = "Student: " + name;
        document.getElementById("paletteStudentName").innerText = name;
        
        switchSubject('Physics'); // Initialize with Physics
        startTimer();
    }

    function switchSubject(subj) {
        currentSubject = subj;
        document.querySelectorAll('.subj-btn').forEach(btn => {
            btn.classList.toggle('active', btn.innerText === subj);
        });
        
        renderPalette();
        
        // Find first question of this subject
        const firstIndex = examData.questions.findIndex(q => q.subject === subj);
        if (firstIndex !== -1) showQuestion(firstIndex);
    }

    function renderPalette() {
        const grid = document.getElementById("palette");
        grid.innerHTML = "";
        
        examData.questions.forEach((q, i) => {
            if (q.subject === currentSubject) {
                let statusClass = "";
                if (reviewStatus[i] && studentAnswers[i]) statusClass = "review-answered";
                else if (reviewStatus[i]) statusClass = "review";
                else if (studentAnswers[i]) statusClass = "answered";
                else if (i === currentIdx) statusClass = ""; // Handled by active check

                grid.innerHTML += `
                    <div class="palette-btn ${statusClass} ${i === currentIdx ? 'active' : ''}" 
                         id="pBtn${i}" onclick="showQuestion(${i})">
                         ${i + 1}
                    </div>`;
            }
        });
    }

    function showQuestion(index) {
        // Handle subject auto-switching if index moves out of current subject
        if (examData.questions[index].subject !== currentSubject) {
            currentSubject = examData.questions[index].subject;
            document.querySelectorAll('.subj-btn').forEach(btn => {
                btn.classList.toggle('active', btn.innerText === currentSubject);
            });
        }

        currentIdx = index;
        const q = examData.questions[index];
        
        // Update Palette Visuals
        renderPalette(); 
        const pBtn = document.getElementById(`pBtn${index}`);
        if (pBtn && !studentAnswers[index] && !reviewStatus[index]) {
            pBtn.classList.add('visited');
        }

        document.getElementById("qNumber").innerText = `Question ${index + 1} (${q.subject})`;
        document.getElementById("qText").innerText = q.question;
        const optDiv = document.getElementById("optionsList");
        
        if (q.options && q.options.length > 0 && q.options[0] !== "") {
            // MCQ: Added the 'checked' logic so answers persist in UI
            optDiv.innerHTML = q.options.map(opt => `
                <div style="margin: 10px 0;">
                    <label>
                        <input type="radio" name="ans" value="${opt}" 
                        ${studentAnswers[index] === opt ? 'checked' : ''}> 
                        ${opt}
                    </label>
                </div>
            `).join("");
        } else {
            // Numerical
            optDiv.innerHTML = `
                <div style="margin: 20px 0;">
                    <input type="number" id="numAns" placeholder="Enter Integer Value" 
                    style="padding:10px; font-size:16px;"
                    value="${studentAnswers[index] || ''}" 
                    oninput="updateNumericalAns(this.value)">
                </div>`;
        }
    }

    function updateNumericalAns(val) {
        if(val !== "") {
            studentAnswers[currentIdx] = val;
        } else {
            delete studentAnswers[currentIdx];
        }
        renderPalette();
    }

    function nextQuestion() {
    if (currentIdx < examData.questions.length - 1) {
        showQuestion(currentIdx + 1);
    } else {
        alert("You are at the last question.");
    }
}

    function saveAndNext() {
    const selected = document.querySelector('input[name="ans"]:checked');
    const pBtn = document.getElementById(`pBtn${currentIdx}`);
    
    if (selected) {
        studentAnswers[currentIdx] = selected.value;
        delete reviewStatus[currentIdx]; // Remove review status if saving
        pBtn.className = "palette-btn answered";
        nextQuestion(); // Move forward after saving
    } else if (document.getElementById("numAns") && document.getElementById("numAns").value !== "") {
        // Handle numerical input
        studentAnswers[currentIdx] = document.getElementById("numAns").value;
        pBtn.className = "palette-btn answered";
        nextQuestion();
    } else {
        alert("Please select an answer to 'Save'. To just skip, use the Question Palette or the Next button.");
    }
}

    function markForReview() {
        const selected = document.querySelector('input[name="ans"]:checked');
        reviewStatus[currentIdx] = true;
        
        if (selected) studentAnswers[currentIdx] = selected.value;

        if (currentIdx < examData.questions.length - 1) {
            showQuestion(currentIdx + 1);
        }
    }

    function clearResponse() {
        delete studentAnswers[currentIdx];
        delete reviewStatus[currentIdx];
        showQuestion(currentIdx);
    }

    function startTimer() {
        const timerDiv = document.getElementById("timer");
        const interval = setInterval(() => {
            timeLeft--;
            let hrs = Math.floor(timeLeft / 3600);
            let mins = Math.floor((timeLeft % 3600) / 60);
            let secs = timeLeft % 60;
            timerDiv.innerText = `${hrs.toString().padStart(2,'0')}:${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
            if(timeLeft <= 0) {
                clearInterval(interval);
                submitFinal(true);
            }
        }, 1000);
    }

    async function submitFinal() {
    if(!confirm("Are you sure you want to submit the exam?")) return;
    
    let score = 0;
    examData.questions.forEach((q, i) => {
        // Use loose equality (==) in case types differ (string vs number)
        if(studentAnswers[i] == q.correctAnswer) score += 4;
        else if(studentAnswers[i]) score -= 1;
    });

    try {
        const response = await fetch(`${BACKEND_URL}/api/public/submit`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                studentName: document.getElementById("nameInput").value,
                examTitle: examData.title,
                score: score
            })
        });

        if (response.ok) {
            alert("Exam Submitted Successfully! Final Score: " + score);
            window.location.reload();
        } else {
            const err = await response.json();
            alert("Submission failed: " + (err.message || "Unknown error"));
        }
    } catch (error) {
        console.error("Submission Error:", error);
        alert("Network Error: Could not connect to the server for submission.");
    }
}

    loadExams();
</script>
</body>
</html>
