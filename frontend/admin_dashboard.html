<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f6f9; padding: 20px; }
        .card { background: white; padding: 15px; margin: 10px 0; border: 2px solid #1e3d59; border-radius: 8px; }
        .result-card { background: #eaf2f8; padding: 15px; margin: 10px 0; border-left: 5px solid #2e86c1; border-radius: 5px; }
        button { padding: 8px 12px; background: #c0392b; color: white; border: none; cursor: pointer; border-radius: 4px; margin-right: 5px;}
        .btn-green { background: #1e8449; }
        .btn-blue { background: #2e86c1; }
        input { padding: 8px; margin-right: 10px; margin-bottom: 10px; width: 250px; border: 1px solid #ccc; border-radius: 4px; }
        
        /* New Modal Styling for Editor */
        #editorModal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); display: none; 
            justify-content: center; align-items: center; z-index: 1000;
        }
        .modal-content {
            background: white; padding: 30px; border-radius: 10px; width: 80%; max-width: 800px;
            max-height: 80vh; overflow-y: auto;
        }
    </style>
</head>
<body>
    <h2>👑 Admin Dashboard</h2>
    <button onclick="logout()">Logout</button>
    <hr>
    
    <h3>📝 Create New Exam</h3>
    <input type="text" id="title" placeholder="Exam Title (e.g., JEE Mains Mock 1)">
    <button class="btn-green" onclick="createExam()">Create Exam</button>
    
    <hr>
    <div style="display: flex; gap: 40px;">
        <div style="flex: 1;">
            <h3>📚 All Exams</h3>
            <button class="btn-green" onclick="loadExams()" style="margin-bottom: 10px;">Refresh Exams</button>
            <div id="examList"></div>
        </div>

        <div style="flex: 1;">
            <h3>🏆 Student Results</h3>
            <button class="btn-green" onclick="loadResults()" style="margin-bottom: 10px;">Refresh Results</button>
            <div id="resultsList"></div>
        </div>
    </div>

    <div id="editorModal">
        <div class="modal-content">
            <button onclick="closeEditor()" style="background:black; float:right;">✖ Close</button>
            <h2 id="modalExamTitle">Manage Questions</h2>
            
            <div style="background:#f0f0f0; padding:15px; border-radius:8px; margin-bottom:20px;">
                <h4>➕ Add New Question</h4>
                <input type="text" id="newQ" placeholder="Question Text" style="width:90%;"><br>
                <input type="text" id="opt1" placeholder="Option 1">
                <input type="text" id="opt2" placeholder="Option 2"><br>
                <input type="text" id="opt3" placeholder="Option 3">
                <input type="text" id="opt4" placeholder="Option 4"><br>
                <input type="text" id="correct" placeholder="Correct Answer (Must exactly match one option)">
                <br>
                <select id="subjectSelect" style="padding: 8px; width: 95%; margin-bottom: 10px;">
                <option value="Physics">Physics</option>
                <option value="Chemistry">Chemistry</option>
                <option value="Maths">Maths</option>
                </select>
                <button class="btn-green" onclick="submitNewQuestion()">Save Question ✅</button>
            </div>
            
            <h3>📋 Existing Questions</h3>
            <div id="existingQuestionsList"></div>
        </div>
    </div>

    <div class="box" style="margin-top: 20px;">
    <h3>👥 User Management</h3>
    <p>Create credentials for Paper Setters or Students</p>
    
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
        <input type="text" id="userName" placeholder="Full Name">
        <input type="email" id="userEmail" placeholder="Email Address">
        <input type="password" id="userPass" placeholder="Set Password">
        <select id="userRole">
            <option value="student">Student</option>
            <option value="setter">Question Paper Setter</option>
            <option value="admin">Another Admin</option>
        </select>
    </div>
    <button class="btn-add" onclick="createUser()" style="width: 100%; margin-top: 10px; background: #2c3e50;">
        Create Account & Generate Hash
    </button>
</div>

    <script>
        const token = localStorage.getItem("adminToken");
        // ⚠️ REPLACE THIS URL IF IT IS DIFFERENT!
        const BACKEND_URL = "https://exam-system-production-5def.up.railway.app"; 

        if (!token) { window.location.href = "login.html"; }

        let currentEditingExamId = null;

        function logout() {
            localStorage.removeItem("adminToken");
            window.location.href = "login.html";
        }

        async function createExam() {
            const title = document.getElementById("title").value;
            if(!title) return alert("Please enter a title!");
            await fetch(`${BACKEND_URL}/api/exams`, {
                method: "POST",
                headers: { "Content-Type": "application/json", "Authorization": `Bearer ${token}` },
                body: JSON.stringify({ title: title, questions: [] })
            });
            document.getElementById("title").value = "";
            loadExams();
        }

        async function loadExams() {
            const res = await fetch(`${BACKEND_URL}/api/exams`, { headers: { "Authorization": `Bearer ${token}` } });
            const exams = await res.json();
            const list = document.getElementById("examList");
            list.innerHTML = "";
            
            exams.forEach(exam => {
                list.innerHTML += `
                    <div class="card">
                        <h4 style="margin: 0 0 10px 0;">${exam.title}</h4>
                        <p style="margin: 0 0 10px 0;">Questions: ${exam.questions ? exam.questions.length : 0}</p>
                        <button class="btn-blue" onclick="openEditor('${exam.id}', '${exam.title}')">Manage Questions ⚙️</button>
                        <button onclick="deleteExam('${exam.id}')">Delete Exam 🗑️</button>
                    </div>`;
            });
        }

        async function deleteExam(id) {
            if (!confirm("Delete this entire exam?")) return;
            await fetch(`${BACKEND_URL}/api/exams/${id}`, { method: "DELETE", headers: { "Authorization": `Bearer ${token}` } });
            loadExams(); 
        }

        // --- NEW EDITOR LOGIC --- //
        
        async function openEditor(id, title) {
            currentEditingExamId = id;
            document.getElementById("modalExamTitle").innerText = `Editing: ${title}`;
            document.getElementById("editorModal").style.display = "flex";
            refreshQuestionList(id);
        }

        function closeEditor() {
            document.getElementById("editorModal").style.display = "none";
            loadExams(); // Refresh main dashboard when closing
        }

        async function refreshQuestionList(examId) {
            const res = await fetch(`${BACKEND_URL}/api/exams`, { headers: { "Authorization": `Bearer ${token}` } });
            const exams = await res.json();
            const exam = exams.find(e => e.id === examId);
            
            const list = document.getElementById("existingQuestionsList");
            list.innerHTML = "";
            
            if (!exam.questions || exam.questions.length === 0) {
                list.innerHTML = "<p>No questions added yet.</p>";
                return;
            }

            exam.questions.forEach((q, index) => {
                list.innerHTML += `
                    <div style="border-bottom:1px solid #ccc; padding:10px 0; margin-bottom:10px;">
                        <p style="margin: 5px 0;"><b>Q${index+1}:</b> ${q.question}</p>
                        <p style="margin: 5px 0; font-size:14px;">Options: [${q.options.join(", ")}] | <span style="color:green;">Correct: ${q.correctAnswer}</span></p>
                        <button onclick="deleteQuestion('${examId}', ${index})">Delete Question 🗑️</button>
                    </div>`;
            });
        }

    async function createUser() {
    // 1. Get values from inputs
    const name = document.getElementById("userName").value;
    const email = document.getElementById("userEmail").value;
    const password = document.getElementById("userPass").value;
    const role = document.getElementById("userRole").value;

    // 2. IMPORTANT: Use the same token name as the rest of the dashboard
    const adminToken = localStorage.getItem("adminToken"); 

    if(!name || !email || !password) return alert("Please fill all fields!");
    if(!adminToken) return alert("Your session has expired. Please log in again.");

    try {
        const res = await fetch(`${BACKEND_URL}/api/admin/users`, {
            method: "POST",
            headers: { 
                "Content-Type": "application/json",
                "Authorization": `Bearer ${adminToken}` // Corrected token variable
            },
            body: JSON.stringify({ name, email, password, role })
        });

        const data = await res.json();

        if (res.ok) {
            alert(`Success: Account created for ${name} ✅`);
            // Clear the form
            document.getElementById("userName").value = "";
            document.getElementById("userEmail").value = "";
            document.getElementById("userPass").value = "";
        } else {
            alert("Error: " + (data.message || "Could not create user. Check backend logs."));
        }
    } catch (err) {
        console.error("Connection Error:", err);
        alert("Network Error: Make sure your Railway server is running!");
    }
}

        async function submitNewQuestion() {
    // 1. Get values from the correct HTML IDs
    const question = document.getElementById("newQ").value;
    const options = [
        document.getElementById("opt1").value,
        document.getElementById("opt2").value,
        document.getElementById("opt3").value,
        document.getElementById("opt4").value
    ];
    const correctAnswer = document.getElementById("correct").value;
    const subject = document.getElementById("subjectSelect").value;

    // 2. Validation
    if(!question || !options[0] || !correctAnswer) {
        return alert("Please fill in the Question, Options, and Correct Answer!");
    }

    try {
        console.log("Attempting to save to:", `${BACKEND_URL}/api/exams/${currentEditingExamId}/questions`);
        
        // 3. Send to Backend
        const res = await fetch(`${BACKEND_URL}/api/exams/${currentEditingExamId}/questions`, {
            method: "POST",
            headers: { 
                "Content-Type": "application/json", 
                "Authorization": `Bearer ${token}` 
            },
            body: JSON.stringify({ 
                question: question, 
                options: options, 
                correctAnswer: correctAnswer,
                subject: subject 
            })
        });

        if (!res.ok) {
            const errorData = await res.json();
            throw new Error(errorData.message || "Server refused to save question");
        }

        alert("Question Saved Successfully! ✅");
        
        // 4. Clear the input boxes for the next question
        document.getElementById("newQ").value = "";
        document.getElementById("opt1").value = "";
        document.getElementById("opt2").value = "";
        document.getElementById("opt3").value = "";
        document.getElementById("opt4").value = "";
        document.getElementById("correct").value = "";
        
        // 5. Refresh the list so you see the new question immediately
        refreshQuestionList(currentEditingExamId);

    } catch (err) {
        console.error("Fetch Error:", err);
        alert("SAVE FAILED: " + err.message);
    }
}
        async function deleteQuestion(examId, index) {
            if(!confirm("Are you sure you want to delete this question?")) return;
            
            await fetch(`${BACKEND_URL}/api/exams/${examId}/questions/${index}`, {
                method: "DELETE",
                headers: { "Authorization": `Bearer ${token}` }
            });
            
            refreshQuestionList(examId);
        }

        async function loadResults() {
            const res = await fetch(`${BACKEND_URL}/api/results`, { headers: { "Authorization": `Bearer ${token}` } });
            const results = await res.json();
            const list = document.getElementById("resultsList");
            list.innerHTML = "";
            results.sort((a,b) => b.score - a.score).forEach((r, i) => {
                list.innerHTML += `<div class="result-card"><b>#${i+1} ${r.studentName}</b>: <span style="color:green">${r.score} marks</span> (${r.examTitle})</div>`;
            });
        }

        loadExams();
        loadResults();
    </script>
</body>
</html>
