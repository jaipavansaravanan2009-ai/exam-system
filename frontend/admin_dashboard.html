<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | JEE Portal</title>
    <style>
        :root {
            --primary: #1e3d59;
            --secondary: #2e86c1;
            --danger: #e74c3c;
            --success: #27ae60;
            --bg: #f4f7f6;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }

        body { background: var(--bg); display: flex; min-height: 100vh; }

        /* Sidebar Navigation */
        .sidebar {
            width: 260px;
            background: var(--primary);
            color: white;
            padding: 20px;
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
        }

        .sidebar h2 { font-size: 20px; margin-bottom: 30px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 15px; }
        
        .nav-btn {
            background: transparent;
            color: white;
            border: none;
            padding: 12px;
            text-align: left;
            width: 100%;
            cursor: pointer;
            border-radius: 6px;
            margin-bottom: 5px;
            transition: 0.3s;
        }

        .nav-btn:hover { background: var(--secondary); }

        .logout-btn { margin-top: auto; background: var(--danger); }

        /* Main Content */
        .main-content { margin-left: 260px; flex: 1; padding: 30px; }

        .header-strip { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }

        .card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-bottom: 25px;
        }

        h3 { color: var(--primary); margin-bottom: 15px; font-size: 18px; }

        /* Inputs & Buttons */
        input, select {
            padding: 10px 15px;
            border: 1px solid #ddd;
            border-radius: 6px;
            margin-bottom: 10px;
            outline: none;
            width: 100%;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
        }

        .btn-primary { background: var(--secondary); color: white; }
        .btn-success { background: var(--success); color: white; }
        .btn-outline { border: 1px solid var(--primary); color: var(--primary); background: transparent; }

        /* Grid Layout for Management */
        .dashboard-grid { display: grid; grid-template-columns: 1.5fr 1fr; gap: 20px; }

        /* Exam List Cards */
        .exam-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            border-bottom: 1px solid #eee;
        }

        /* Modal Styling */
        #editorModal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); display: none; 
            justify-content: center; align-items: center; z-index: 2000;
        }
        .modal-content {
            background: white; padding: 30px; border-radius: 12px; width: 90%; max-width: 900px;
            max-height: 90vh; overflow-y: auto;
        }

    </style>
</head>
<body>

<div class="sidebar">
    <h2>👑 Admin Portal</h2>
    <button class="nav-btn" onclick="scrollToSec('exams')">📚 Manage Exams</button>
    <button class="nav-btn" onclick="scrollToSec('users')">👥 User Accounts</button>
    <button class="nav-btn" onclick="scrollToSec('results')">🏆 Exam Results</button>
    <button class="nav-btn logout-btn" onclick="logout()">Logout</button>
</div>

<div class="main-content">
    <div class="header-strip">
        <h1>Dashboard Overview</h1>
        <p id="adminName">Welcome, Administrator</p>
    </div>

    <div class="dashboard-grid">
        <div class="left-col">
            <div class="card" id="exams">
                <h3>📝 Create New Exam</h3>
                <div style="display: flex; gap: 10px;">
                    <input type="text" id="title" placeholder="Exam Title (e.g. JEE Mock Sept)">
                    <button class="btn btn-success" onclick="createExam()">Create</button>
                </div>
            </div>

            <div class="card">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <h3>📚 Active Exams</h3>
                    <button class="btn btn-outline" onclick="loadExams()">Refresh</button>
                </div>
                <div id="examList">Loading exams...</div>
            </div>
        </div>

        <div class="right-col">
            <div class="card" id="users">
                <h3>👥 Add System User</h3>
                <input type="text" id="userName" placeholder="Full Name">
                <input type="email" id="userEmail" placeholder="Email Address">
                <input type="password" id="userPass" placeholder="Set Password">
                <select id="userRole">
                    <option value="student">Student</option>
                    <option value="setter">Paper Setter</option>
                    <option value="admin">Admin</option>
                </select>
                <button class="btn btn-primary" style="width:100%" onclick="createUser()">Generate & Save User</button>
            </div>

            <div class="card" id="results">
                <h3>🏆 Latest Results</h3>
                <div id="resultsList" style="font-size: 14px;"></div>
            </div>
        </div>
    </div>
</div>

<div id="editorModal">
    <div class="modal-content">
        <button class="btn" style="float:right; background:#333; color:white;" onclick="closeEditor()">Close</button>
        <h2 id="modalExamTitle">Manage Questions</h2>
        <hr style="margin: 20px 0;">
        
        <div style="background:#f9f9f9; padding:20px; border-radius:10px; border: 1px solid #ddd;">
            <h4>Add Question to Paper</h4><br>
            <input type="text" id="newQ" placeholder="Question Statement">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <input type="text" id="opt1" placeholder="Option A">
                <input type="text" id="opt2" placeholder="Option B">
                <input type="text" id="opt3" placeholder="Option C">
                <input type="text" id="opt4" placeholder="Option D">
            </div>
            <input type="text" id="correct" placeholder="Correct Answer (Exact text)">
            <select id="subjectSelect">
                <option value="Physics">Physics</option>
                <option value="Chemistry">Chemistry</option>
                <option value="Maths">Maths</option>
            </select>
            <button class="btn btn-success" onclick="submitNewQuestion()">Add Question ✅</button>
        </div>
        
        <h3 style="margin-top: 30px;">Current Question Bank</h3>
        <div id="existingQuestionsList"></div>
    </div>
</div>

<script>
    const BACKEND_URL = "https://exam-system-production-5def.up.railway.app";
    const token = localStorage.getItem("adminToken");

    // Redirect if not logged in
    if (!token) { window.location.href = "login.html"; }

    let currentEditingExamId = null;

    function logout() {
        localStorage.removeItem("adminToken");
        window.location.href = "login.html";
    }

    // --- USER MANAGEMENT FIX ---
    async function createUser() {
        const name = document.getElementById("userName").value;
        const email = document.getElementById("userEmail").value;
        const password = document.getElementById("userPass").value;
        const role = document.getElementById("userRole").value;

        if(!name || !email || !password) return alert("All fields are required!");

        try {
            const res = await fetch(`${BACKEND_URL}/api/admin/users`, {
                method: "POST",
                headers: { 
                    "Content-Type": "application/json",
                    "Authorization": `Bearer ${token}` 
                },
                body: JSON.stringify({ name, email, password, role })
            });
            const data = await res.json();
            alert(data.message || "User created!");
            
            // Reset fields
            document.getElementById("userName").value = "";
            document.getElementById("userEmail").value = "";
            document.getElementById("userPass").value = "";
        } catch (e) { alert("Error connecting to server."); }
    }

    // --- EXAM LOGIC ---
    async function createExam() {
        const title = document.getElementById("title").value;
        if(!title) return alert("Enter exam title");
        
        const res = await fetch(`${BACKEND_URL}/api/exams`, {
            method: "POST",
            headers: { "Content-Type": "application/json", "Authorization": `Bearer ${token}` },
            body: JSON.stringify({ title, questions: [] })
        });
        if(res.ok) { loadExams(); document.getElementById("title").value = ""; }
    }

    async function loadExams() {
        const res = await fetch(`${BACKEND_URL}/api/exams`, { headers: { "Authorization": `Bearer ${token}` } });
        const exams = await res.json();
        const list = document.getElementById("examList");
        list.innerHTML = "";
        
        exams.forEach(exam => {
            list.innerHTML += `
                <div class="exam-item">
                    <div>
                        <strong>${exam.title}</strong><br>
                        <small>${exam.questions ? exam.questions.length : 0} Questions</small>
                    </div>
                    <div>
                        <button class="btn btn-outline" onclick="openEditor('${exam.id}', '${exam.title}')">⚙️ Edit</button>
                        <button class="btn btn-primary" style="background:#e74c3c" onclick="deleteExam('${exam.id}')">🗑️</button>
                    </div>
                </div>`;
        });
    }

    async function openEditor(id, title) {
        currentEditingExamId = id;
        document.getElementById("modalExamTitle").innerText = `Editing: ${title}`;
        document.getElementById("editorModal").style.display = "flex";
        refreshQuestionList(id);
    }

    function closeEditor() { document.getElementById("editorModal").style.display = "none"; loadExams(); }

    async function refreshQuestionList(examId) {
        const res = await fetch(`${BACKEND_URL}/api/exams`, { headers: { "Authorization": `Bearer ${token}` } });
        const exams = await res.json();
        const exam = exams.find(e => e.id === examId);
        const list = document.getElementById("existingQuestionsList");
        list.innerHTML = "";
        
        if (exam.questions) {
            exam.questions.forEach((q, i) => {
                list.innerHTML += `<div style="padding:10px; border-bottom:1px solid #eee">
                    <b>Q${i+1}:</b> ${q.question} <br>
                    <button class="btn" style="font-size:12px; margin-top:5px;" onclick="deleteQuestion('${examId}', ${i})">Delete</button>
                </div>`;
            });
        }
    }

    async function submitNewQuestion() {
        const payload = {
            question: document.getElementById("newQ").value,
            options: [document.getElementById("opt1").value, document.getElementById("opt2").value, document.getElementById("opt3").value, document.getElementById("opt4").value],
            correctAnswer: document.getElementById("correct").value,
            subject: document.getElementById("subjectSelect").value
        };

        const res = await fetch(`${BACKEND_URL}/api/exams/${currentEditingExamId}/questions`, {
            method: "POST",
            headers: { "Content-Type": "application/json", "Authorization": `Bearer ${token}` },
            body: JSON.stringify(payload)
        });

        if(res.ok) {
            alert("Added!");
            refreshQuestionList(currentEditingExamId);
        }
    }

    async function loadResults() {
        const res = await fetch(`${BACKEND_URL}/api/results`, { headers: { "Authorization": `Bearer ${token}` } });
        const results = await res.json();
        const list = document.getElementById("resultsList");
        list.innerHTML = results.map(r => `<div><strong>${r.studentName}</strong>: ${r.score} marks</div>`).join("");
    }

    // Helper for Sidebar
    function scrollToSec(id) { document.getElementById(id).scrollIntoView({behavior: 'smooth'}); }

    // Init
    loadExams();
    loadResults();
</script>

</body>
</html>
