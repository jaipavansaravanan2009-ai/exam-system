<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | JEE Portal</title>
    <style>
        :root {
            --primary: #1e3d59;
            --secondary: #2e86c1;
            --danger: #e74c3c;
            --success: #27ae60;
            --bg: #f4f7f6;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }

        body { background: var(--bg); display: flex; min-height: 100vh; }

        /* Sidebar Navigation */
        .sidebar {
            width: 260px;
            background: var(--primary);
            color: white;
            padding: 20px;
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
        }

        .sidebar h2 { font-size: 20px; margin-bottom: 30px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 15px; }
        
        .nav-btn {
            background: transparent;
            color: white;
            border: none;
            padding: 12px;
            text-align: left;
            width: 100%;
            cursor: pointer;
            border-radius: 6px;
            margin-bottom: 5px;
            transition: 0.3s;
        }

        .nav-btn:hover { background: var(--secondary); }

        .logout-btn { margin-top: auto; background: var(--danger); }

        /* Main Content */
        .main-content { margin-left: 260px; flex: 1; padding: 30px; }

        .header-strip { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }

        .card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-bottom: 25px;
        }

        h3 { color: var(--primary); margin-bottom: 15px; font-size: 18px; }

        /* Inputs & Buttons */
        input[type="text"], input[type="password"], input[type="email"], select {
            padding: 10px 15px;
            border: 1px solid #ddd;
            border-radius: 6px;
            margin-bottom: 10px;
            outline: none;
            width: 100%;
        }

        /* Styling for the new image upload buttons */
        input[type="file"] {
            font-size: 12px;
            color: #666;
            margin-bottom: 15px;
            width: 100%;
        }

        .opt-container {
            background: #fff;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            margin-bottom: 10px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
        }

        .btn-primary { background: var(--secondary); color: white; }
        .btn-success { background: var(--success); color: white; }
        .btn-outline { border: 1px solid var(--primary); color: var(--primary); background: transparent; }

        /* Grid Layout for Management */
        .dashboard-grid { display: grid; grid-template-columns: 1.5fr 1fr; gap: 20px; }

        /* Exam List Cards */
        .exam-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            border-bottom: 1px solid #eee;
        }

        /* Modal Styling */
        #editorModal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); display: none; 
            justify-content: center; align-items: center; z-index: 2000;
        }
        .modal-content {
            background: white; padding: 30px; border-radius: 12px; width: 90%; max-width: 900px;
            max-height: 90vh; overflow-y: auto;
        }

    </style>
</head>
<body>

<div class="sidebar">
    <h2>👑 Admin Portal</h2>
    <button class="nav-btn" onclick="scrollToSec('exams')">📚 Manage Exams</button>
    <button class="nav-btn" onclick="scrollToSec('users')">👥 User Accounts</button>
    <button class="nav-btn" onclick="scrollToSec('results')">🏆 Exam Results</button>
    <button class="nav-btn logout-btn" onclick="logout()">Logout</button>
</div>

<div class="main-content">
    <div class="header-strip">
        <h1>Dashboard Overview</h1>
        <p id="adminName">Welcome, Administrator</p>
    </div>

    <div class="dashboard-grid">
        <div class="left-col">
            <div class="card" id="exams">
                <h3>📝 Create New Exam</h3>
                <div style="display: flex; gap: 10px;">
                    <input type="text" id="title" placeholder="Exam Title (e.g. JEE Mock Sept)">
                    <button class="btn btn-success" onclick="createExam()">Create</button>
                </div>
            </div>

            <div class="card">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <h3>📚 Active Exams</h3>
                    <button class="btn btn-outline" onclick="loadExams()">Refresh</button>
                </div>
                <div id="examList">Loading exams...</div>
            </div>
        </div>

        <div class="right-col">
            <div class="card" id="users">
                <h3>👥 Add System User</h3>
                <input type="text" id="userName" placeholder="Full Name">
                <input type="email" id="userEmail" placeholder="Email Address">
                <input type="password" id="userPass" placeholder="Set Password">
                <select id="userRole">
                    <option value="student">Student</option>
                    <option value="setter">Paper Setter</option>
                    <option value="admin">Admin</option>
                </select>
                <button class="btn btn-primary" style="width:100%" onclick="createUser()">Generate & Save User</button>
            </div>

            <div class="card" id="results">
                <h3>🏆 Latest Results</h3>
                <div id="resultsList" style="font-size: 14px;"></div>
            </div>
        </div>
    </div>
</div>

<div id="editorModal">
    <div class="modal-content">
        <button class="btn" style="float:right; background:#333; color:white;" onclick="closeEditor()">Close</button>
        <h2 id="modalExamTitle">Manage Questions</h2>
        <hr style="margin: 20px 0;">
        
        <div style="background:#f9f9f9; padding:20px; border-radius:10px; border: 1px solid #ddd;">
            <h4>Add Question to Paper</h4><br>
            
            <input type="text" id="newQ" placeholder="Question Statement (Required)">
            <label style="font-size: 12px; color: #555;">Optional Question Image:</label>
            <input type="file" id="qImg" accept="image/*">
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px;">
                <div class="opt-container">
                    <input type="text" id="opt1" placeholder="Option A Text">
                    <label style="font-size: 11px;">Image (Opt A):</label>
                    <input type="file" id="opt1Img" accept="image/*">
                </div>
                <div class="opt-container">
                    <input type="text" id="opt2" placeholder="Option B Text">
                    <label style="font-size: 11px;">Image (Opt B):</label>
                    <input type="file" id="opt2Img" accept="image/*">
                </div>
                <div class="opt-container">
                    <input type="text" id="opt3" placeholder="Option C Text">
                    <label style="font-size: 11px;">Image (Opt C):</label>
                    <input type="file" id="opt3Img" accept="image/*">
                </div>
                <div class="opt-container">
                    <input type="text" id="opt4" placeholder="Option D Text">
                    <label style="font-size: 11px;">Image (Opt D):</label>
                    <input type="file" id="opt4Img" accept="image/*">
                </div>
            </div>

            <input type="text" id="correct" placeholder="Correct Answer (Must exactly match the text of Option A, B, C, or D)" style="margin-top: 10px;">
            <select id="subjectSelect">
                <option value="Physics">Physics</option>
                <option value="Chemistry">Chemistry</option>
                <option value="Maths">Maths</option>
            </select>
            <button class="btn btn-success" id="addQuestionBtn" onclick="submitNewQuestion()" style="width: 100%; margin-top: 10px;">Add Question ✅</button>
        </div>
        
        <h3 style="margin-top: 30px;">Current Question Bank</h3>
        <div id="existingQuestionsList"></div>
    </div>
</div>

<script>
    // Make sure to replace this URL with your actual Render URL if needed
    const BACKEND_URL = "https://exam-system-production-5def.up.railway.app"; 
    
    // 1. Get Tokens
    const token = localStorage.getItem("adminToken");
    const role = localStorage.getItem("userRole");

    console.log("Checking Admin Access...");
    console.log("Token exists:", !!token);
    console.log("Role found:", role);

    // 2. Fortified Guard Logic
    if (!token || !role || role.toLowerCase() !== "admin") {
        console.error("⛔ ACCESS DENIED: Redirecting to login...");
        alert("Unauthorized! Please login as Admin.");
        window.location.href = "login.html";
    }

    // Set Welcome Name
    const adminName = localStorage.getItem("userName");
    if(adminName) {
        document.getElementById("adminName").innerText = "Welcome, " + adminName;
    }

    let currentEditingExamId = null;

    // --- HELPER: IMAGE COMPRESSOR ---
    // This safely shrinks images so they don't break your database
    function compressImage(file) {
        return new Promise((resolve) => {
            if (!file) return resolve(null); // No file selected
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = event => {
                const img = new Image();
                img.src = event.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 700; // Safe width for exam reading
                    let width = img.width;
                    let height = img.height;

                    if (width > MAX_WIDTH) {
                        height = Math.round((height * MAX_WIDTH) / width);
                        width = MAX_WIDTH;
                    }

                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    // Compress to JPEG format at 70% quality
                    resolve(canvas.toDataURL('image/jpeg', 0.7)); 
                }
            };
        });
    }

    // --- LOGOUT FUNCTION ---
    function logout() {
        localStorage.clear();
        window.location.href = "login.html";
    }

    // --- CREATE NEW EXAM ---
    async function createExam() {
        const title = document.getElementById("title").value.trim();
        if (!title) return alert("Please enter an exam title.");

        try {
            const res = await fetch(`${BACKEND_URL}/api/exams`, {
                method: "POST",
                headers: { 
                    "Content-Type": "application/json",
                    "Authorization": `Bearer ${token}` 
                },
                body: JSON.stringify({ title: title, questions: [] })
            });

            if (res.ok) {
                alert("Exam created successfully! ✅");
                document.getElementById("title").value = "";
                loadExams();
            } else {
                alert("Failed to create exam.");
            }
        } catch (error) {
            console.error("Error creating exam:", error);
        }
    }

    // --- CREATE NEW USER ---
    async function createUser() {
        const name = document.getElementById("userName").value.trim();
        const email = document.getElementById("userEmail").value.trim();
        const password = document.getElementById("userPass").value.trim();
        const userRole = document.getElementById("userRole").value;

        if (!name || !email || !password) return alert("Please fill all user fields.");

        try {
            const res = await fetch(`${BACKEND_URL}/api/admin/users`, {
                method: "POST",
                headers: { 
                    "Content-Type": "application/json",
                    "Authorization": `Bearer ${token}` 
                },
                body: JSON.stringify({ name, email, password, role: userRole })
            });

            if (res.ok) {
                alert(`User ${name} created successfully! ✅`);
                document.getElementById("userName").value = "";
                document.getElementById("userEmail").value = "";
                document.getElementById("userPass").value = "";
            } else {
                alert("Failed to create user.");
            }
        } catch (error) {
            console.error("Error creating user:", error);
        }
    }

    // --- DELETE EXAM ---
    async function deleteExam(id) {
        if(!confirm("Are you sure you want to delete this entire exam?")) return;
        try {
            const res = await fetch(`${BACKEND_URL}/api/exams/${id}`, {
                method: "DELETE",
                headers: { "Authorization": `Bearer ${token}` }
            });
            if(res.ok) loadExams();
        } catch(e) { console.error(e); }
    }

    // --- DELETE QUESTION ---
    async function deleteQuestion(examId, index) {
        if(!confirm("Delete this question?")) return;
        try {
            const res = await fetch(`${BACKEND_URL}/api/exams/${examId}/questions/${index}`, {
                method: "DELETE",
                headers: { "Authorization": `Bearer ${token}` }
            });
            if(res.ok) refreshQuestionList(examId);
        } catch(e) { console.error(e); }
    }

    // --- SUBMIT NEW QUESTION WITH IMAGES ---
    async function submitNewQuestion() {
        const btn = document.getElementById("addQuestionBtn");
        btn.innerText = "Processing Images... ⏳";
        btn.disabled = true;

        try {
            // 1. Compress and encode all uploaded images (returns null if no file selected)
            const [qImage, o1Image, o2Image, o3Image, o4Image] = await Promise.all([
                compressImage(document.getElementById("qImg").files[0]),
                compressImage(document.getElementById("opt1Img").files[0]),
                compressImage(document.getElementById("opt2Img").files[0]),
                compressImage(document.getElementById("opt3Img").files[0]),
                compressImage(document.getElementById("opt4Img").files[0])
            ]);

            // 2. Build the payload
            const payload = {
                question: document.getElementById("newQ").value,
                questionImage: qImage, // Will be Base64 string or null
                options: [
                    document.getElementById("opt1").value, 
                    document.getElementById("opt2").value, 
                    document.getElementById("opt3").value, 
                    document.getElementById("opt4").value
                ],
                optionImages: [o1Image, o2Image, o3Image, o4Image], // Array of Base64 strings or nulls
                correctAnswer: document.getElementById("correct").value,
                subject: document.getElementById("subjectSelect").value
            };

            if(!payload.question || !payload.correctAnswer) {
                btn.innerText = "Add Question ✅";
                btn.disabled = false;
                return alert("Please fill basic text details!");
            }

            // 3. Send to Python Backend
            const res = await fetch(`${BACKEND_URL}/api/exams/${currentEditingExamId}/questions`, {
                method: "POST",
                headers: { 
                    "Content-Type": "application/json", 
                    "Authorization": `Bearer ${token}` 
                },
                body: JSON.stringify(payload)
            });

            if(res.ok) {
                alert("Question added successfully! ✅");
                // Clear all text inputs
                document.getElementById("newQ").value = "";
                document.getElementById("opt1").value = "";
                document.getElementById("opt2").value = "";
                document.getElementById("opt3").value = "";
                document.getElementById("opt4").value = "";
                document.getElementById("correct").value = "";
                
                // Clear all file inputs
                document.getElementById("qImg").value = "";
                document.getElementById("opt1Img").value = "";
                document.getElementById("opt2Img").value = "";
                document.getElementById("opt3Img").value = "";
                document.getElementById("opt4Img").value = "";

                refreshQuestionList(currentEditingExamId);
            } else {
                alert("Failed to add question.");
            }
        } catch(e) { 
            console.error(e); 
            alert("Error uploading question.");
        } finally {
            btn.innerText = "Add Question ✅";
            btn.disabled = false;
        }
    }

    // --- REFRESH QUESTION LIST ---
    async function refreshQuestionList(examId) {
        try {
            const res = await fetch(`${BACKEND_URL}/api/exams`, { 
                headers: { "Authorization": `Bearer ${token}` } 
            });
            const exams = await res.json();
            const exam = exams.find(e => e.id === examId);
            const list = document.getElementById("existingQuestionsList");
            list.innerHTML = "";
            
            if (exam && exam.questions) {
                exam.questions.forEach((q, i) => {
                    // Show a little picture icon if the question has an image attached
                    const hasImg = q.questionImage ? '🖼️ [Image Attached]' : '';
                    
                    list.innerHTML += `
                    <div style="padding:15px; border-bottom:1px solid #eee; display:flex; justify-content:space-between; align-items:center;">
                        <div>
                            <span style="background:#eee; padding:2px 6px; border-radius:4px; font-size:11px;">${q.subject}</span><br>
                            <b>Q${i+1}:</b> ${q.question} <br>
                            <small style="color: blue;">${hasImg}</small>
                        </div>
                        <button class="btn" style="background:#ff7675; color:white; font-size:12px;" onclick="deleteQuestion('${examId}', ${i})">Delete</button>
                    </div>`;
                });
            }
        } catch(e) { console.error(e); }
    }

    // --- LOAD EXAMS ---
    async function loadExams() {
        try {
            const res = await fetch(`${BACKEND_URL}/api/exams`, { headers: { "Authorization": `Bearer ${token}` } });
            const exams = await res.json();
            const list = document.getElementById("examList");
            list.innerHTML = "";
            
            exams.forEach(exam => {
                list.innerHTML += `
                    <div class="exam-item">
                        <div>
                            <strong>${exam.title}</strong><br>
                            <small>${exam.questions ? exam.questions.length : 0} Questions</small>
                        </div>
                        <div>
                            <button class="btn btn-outline" onclick="openEditor('${exam.id}', '${exam.title}')">⚙️ Edit</button>
                            <button class="btn btn-primary" style="background:#e74c3c" onclick="deleteExam('${exam.id}')">🗑️</button>
                        </div>
                    </div>`;
            });
        } catch(e) { console.error("Could not load exams:", e); }
    }

    // --- MODAL CONTROLS ---
    async function openEditor(id, title) {
        currentEditingExamId = id;
        document.getElementById("modalExamTitle").innerText = `Editing: ${title}`;
        document.getElementById("editorModal").style.display = "flex";
        refreshQuestionList(id);
    }

    function closeEditor() { 
        document.getElementById("editorModal").style.display = "none"; 
        loadExams(); 
    }

    // --- LOAD RESULTS ---
    async function loadResults() {
        try {
            const res = await fetch(`${BACKEND_URL}/api/results`, { headers: { "Authorization": `Bearer ${token}` } });
            if(res.ok) {
                const results = await res.json();
                const list = document.getElementById("resultsList");
                if(results.length === 0) {
                    list.innerHTML = "<div>No results yet.</div>";
                } else {
                    list.innerHTML = results.map(r => `<div><strong>${r.studentName || 'Student'}</strong>: ${r.score} marks</div>`).join("");
                }
            } else {
                document.getElementById("resultsList").innerHTML = "<div>Cannot fetch results.</div>";
            }
        } catch(e) { console.error("Could not load results:", e); }
    }

    // --- HELPER SCROLL ---
    function scrollToSec(id) { 
        document.getElementById(id).scrollIntoView({behavior: 'smooth'}); 
    }

    // Initialize Page
    if (token && role && role.toLowerCase() === "admin") {
        loadExams();
        loadResults();
    }
</script>

</body>
</html>
