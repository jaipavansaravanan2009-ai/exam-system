<!DOCTYPE html>
<html>
<head>
    <title>JEE Mains Mock - Live Exam</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; background: #f0f2f5; display: flex; flex-direction: column; height: 100vh; }
        header { background: #1e3d59; color: white; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; }
        .main-container { display: flex; flex: 1; overflow: hidden; }
        .question-section { flex: 3; padding: 30px; overflow-y: auto; background: white; }
        .sidebar { flex: 1; background: #e5e7e9; border-left: 2px solid #ccc; padding: 15px; display: flex; flex-direction: column; }
        .palette-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-top: 20px; }
        .palette-btn { width: 35px; height: 35px; border: 1px solid #999; display: flex; align-items: center; justify-content: center; cursor: pointer; background: white; border-radius: 4px; font-size: 12px; }
        .palette-btn.active { border: 2px solid #000; font-weight: bold; }
        .palette-btn.answered { background: #27ae60; color: white; }
        .palette-btn.visited { background: #e74c3c; color: white; }
        .palette-btn.review { background: #8e44ad; color: white; border-radius: 50%; }
        .controls { margin-top: 30px; display: flex; gap: 10px; }
        .btn { padding: 10px 20px; border: none; cursor: pointer; border-radius: 4px; font-weight: bold; color: white; }
        #timer { font-size: 20px; font-weight: bold; background: #f39c12; padding: 5px 15px; border-radius: 5px; }
    </style>
</head>
<body>

<header>
    <div id="examTitleHeader">JEE Mock Exam</div>
    <div id="studentNameHeader">Candidate: Loading...</div>
    <div id="timer">03:00:00</div>
</header>

<div class="main-container" id="examUI" style="display: none;">
    <div class="question-section">
        <h3 id="qNumber">Question 1</h3>
        <hr>
        <div id="qText" style="font-size: 18px; margin: 20px 0;">Loading...</div>
        <div id="optionsList"></div>
        <div class="controls">
            <button class="btn" style="background:#27ae60;" onclick="saveAndNext()">Save & Next</button>
            <button class="btn" style="background:#95a5a6;" onclick="clearResponse()">Clear</button>
            <button class="btn" style="background:#8e44ad;" onclick="markForReview()">Review & Next</button>
            <button class="btn" style="background:#e67e22;" onclick="submitFinal()">Submit Exam</button>
        </div>
    </div>

    <div class="sidebar">
        <h4>Question Palette</h4>
        <div class="palette-grid" id="palette"></div>
    </div>
</div>

<script>
    const BACKEND_URL = "https://exam-system-production-5def.up.railway.app";
    let examData = null;
    let currentIdx = 0;
    let studentAnswers = {};
    let reviewStatus = {};
    let timeLeft = 3 * 60 * 60;

    window.onload = async () => {
        const urlParams = new URLSearchParams(window.location.search);
        const examId = urlParams.get('id');
        if (!examId) return alert("No Exam ID found!");

        document.getElementById("studentNameHeader").innerText = "Candidate: " + (localStorage.getItem("userName") || "Guest");
        
        try {
            const res = await fetch(`${BACKEND_URL}/api/public/exams/${examId}`);
            if (!res.ok) throw new Error("Exam not found");
            examData = await res.json();
            
            document.getElementById("examTitleHeader").innerText = examData.title;
            document.getElementById("examUI").style.display = "flex";
            showQuestion(0);
            startTimer();
        } catch (err) {
            alert("Failed to load exam. Check your internet or ID.");
        }
    };

    function showQuestion(index) {
        currentIdx = index;
        const q = examData.questions[index];
        document.getElementById("qNumber").innerText = `Question ${index + 1} (${q.subject || 'General'})`;
        document.getElementById("qText").innerText = q.question;
        
        const optDiv = document.getElementById("optionsList");
        optDiv.innerHTML = q.options.map(opt => `
            <div style="margin: 10px 0;">
                <label><input type="radio" name="ans" value="${opt}" ${studentAnswers[index] === opt ? 'checked' : ''}> ${opt}</label>
            </div>
        `).join("");
        renderPalette();
    }

    function renderPalette() {
        const grid = document.getElementById("palette");
        grid.innerHTML = examData.questions.map((_, i) => {
            let status = "";
            if (studentAnswers[i]) status = "answered";
            else if (reviewStatus[i]) status = "review";
            return `<div class="palette-btn ${status} ${i === currentIdx ? 'active' : ''}" onclick="showQuestion(${i})">${i + 1}</div>`;
        }).join("");
    }

    function saveAndNext() {
        const selected = document.querySelector('input[name="ans"]:checked');
        if (selected) studentAnswers[currentIdx] = selected.value;
        if (currentIdx < examData.questions.length - 1) showQuestion(currentIdx + 1);
    }

    function markForReview() {
        reviewStatus[currentIdx] = true;
        if (currentIdx < examData.questions.length - 1) showQuestion(currentIdx + 1);
    }

    function clearResponse() {
        delete studentAnswers[currentIdx];
        showQuestion(currentIdx);
    }

    function startTimer() {
        setInterval(() => {
            timeLeft--;
            let h = Math.floor(timeLeft / 3600), m = Math.floor((timeLeft % 3600) / 60), s = timeLeft % 60;
            document.getElementById("timer").innerText = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
            if(timeLeft <= 0) submitFinal();
        }, 1000);
    }

    async function submitFinal() {
        if(!confirm("Submit exam?")) return;
        let score = 0;
        examData.questions.forEach((q, i) => {
            if(studentAnswers[i] === q.correctAnswer) score += 4;
            else if(studentAnswers[i]) score -= 1;
        });

        await fetch(`${BACKEND_URL}/api/public/submit`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ studentName: localStorage.getItem("userName"), examTitle: examData.title, score })
        });
        alert("Exam Submitted! Final Score: " + score);
        window.location.href = "student_portal.html";
    }
</script>
</body>
</html>
