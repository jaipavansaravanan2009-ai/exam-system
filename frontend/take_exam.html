<!DOCTYPE html>
<html>
<head>
    <title>JEE Mains Mock - Official Interface</title>
    <style>
        :root { --nta-blue: #1e3d59; --green: #27ae60; --red: #e74c3c; --purple: #8e44ad; --gray: #bdc3c7; }
        body { font-family: Arial, sans-serif; margin: 0; background: #f0f2f5; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* Header & Subject Bar */
        header { background: var(--nta-blue); color: white; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; }
        .subject-bar { background: #fff; border-bottom: 1px solid #ccc; display: flex; }
        .sub-btn { padding: 12px 25px; border: none; background: none; cursor: pointer; font-weight: bold; border-right: 1px solid #eee; }
        .sub-btn.active { background: var(--nta-blue); color: white; }

        .main-container { display: flex; flex: 1; overflow: hidden; }
        .question-section { flex: 3; padding: 30px; overflow-y: auto; background: white; }
        .sidebar { flex: 1; background: #e5e7e9; border-left: 2px solid #ccc; padding: 15px; display: flex; flex-direction: column; }

        /* Image Handling for Chemistry/Physics */
        .exam-img { max-width: 100%; max-height: 250px; border-radius: 8px; margin-top: 15px; display: block; border: 1px solid #ddd; padding: 5px; cursor: zoom-in; transition: 0.2s; }
        .exam-img:hover { box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .opt-img { max-width: 200px; max-height: 80px; border-radius: 4px; margin-left: 15px; vertical-align: middle; border: 1px solid #eee; cursor: zoom-in; transition: 0.2s; }
        .opt-img:hover { border-color: var(--secondary); }
        .opt-row { margin: 12px 0; padding: 10px; border: 1px solid #f0f0f0; border-radius: 6px; transition: 0.2s; }
        .opt-row:hover { background: #f9f9f9; border-color: #ddd; }

        /* Lightbox Modal for Enlarge Image */
        #imageModal {
            display: none; 
            position: fixed; 
            z-index: 3000; 
            left: 0; 
            top: 0; 
            width: 100%; 
            height: 100%; 
            background-color: rgba(0,0,0,0.85); 
            justify-content: center; 
            align-items: center;
            backdrop-filter: blur(5px);
        }
        #modalImg {
            max-width: 90%; 
            max-height: 90vh; 
            border-radius: 8px; 
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        .close-modal {
            position: absolute; 
            top: 20px; 
            right: 35px; 
            color: #f1f1f1; 
            font-size: 40px; 
            font-weight: bold; 
            cursor: pointer;
            transition: 0.2s;
        }
        .close-modal:hover { color: #e74c3c; }

        /* Palette Colors */
        .palette-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-top: 15px; }
        .p-btn { width: 35px; height: 35px; border: 1px solid #999; display: flex; align-items: center; justify-content: center; cursor: pointer; background: white; border-radius: 4px; font-size: 12px; }
        .p-btn.active { border: 2px solid #000; outline: 2px solid #3498db; }
        
        .p-btn.visited { background: var(--red); color: white; border-radius: 50% 50% 0 0; } /* NTA style shape */
        .p-btn.answered { background: var(--green); color: white; border-radius: 0 0 50% 50%; }
        .p-btn.review { background: var(--purple); color: white; border-radius: 50%; }
        .p-btn.review-answered { background: var(--purple); color: white; border-radius: 50%; position: relative; }
        .p-btn.review-answered::after { content: ''; position: absolute; bottom: 2px; right: 2px; width: 8px; height: 8px; background: var(--green); border-radius: 50%; border: 1px solid white; }

        .controls { margin-top: 30px; display: flex; gap: 10px; border-top: 1px solid #eee; padding-top: 20px; }
        .btn { padding: 10px 18px; border: none; cursor: pointer; border-radius: 4px; font-weight: bold; color: white; }
        #timer { font-size: 20px; font-weight: bold; background: #f39c12; padding: 5px 15px; border-radius: 5px; }
    </style>
</head>
<body>

<header>
    <div id="examTitle">JEE Mock Exam</div>
    <div id="timer">03:00:00</div>
</header>

<div class="subject-bar">
    <button class="sub-btn active" onclick="filterSubject('Physics')">Physics</button>
    <button class="sub-btn" onclick="filterSubject('Chemistry')">Chemistry</button>
    <button class="sub-btn" onclick="filterSubject('Mathematics')">Mathematics</button>
</div>

<div class="main-container" id="examUI" style="display: none;">
    <div class="question-section">
        <h3 id="qNumber">Question</h3>
        <hr>
        <div id="qText" style="font-size: 18px; margin: 20px 0;">Select a subject to begin.</div>
        <div id="optionsList"></div>
        
        <div class="controls">
            <button class="btn" style="background:#27ae60;" onclick="saveAndNext()">Save & Next</button>
            <button class="btn" style="background:#95a5a6;" onclick="clearResponse()">Clear Response</button>
            <button class="btn" style="background:#8e44ad;" onclick="markForReview()">Mark for Review & Next</button>
            <button class="btn" style="background:#e67e22;" onclick="submitFinal()">Submit Exam</button>
        </div>
    </div>

    <div class="sidebar">
        <h4>Question Palette</h4>
        <div class="palette-grid" id="palette"></div>
        <div style="margin-top: auto; font-size: 12px;">
            <p>🟢 Answered | 🔴 Not Answered | 🟣 Review | ⚪ Not Visited</p>
        </div>
    </div>
</div>

<div id="imageModal" onclick="closeLightbox(event)">
    <span class="close-modal" onclick="closeLightbox(event)">&times;</span>
    <img id="modalImg" src="">
</div>

<script>
    // Ensure this matches your Render URL
    const BACKEND_URL = "https://jee-mock-portal.onrender.com"; 
    
    let examData = null;
    let currentIdx = -1;
    let currentSub = 'Physics';
    let studentAnswers = {}; // { index: value }
    let statusMap = {}; // { index: 'visited' | 'answered' | 'review' | 'review-answered' }
    let timeLeft = 180 * 60; // 3 hours

    window.onload = async () => {
        const urlParams = new URLSearchParams(window.location.search);
        const examId = urlParams.get('id');
        try {
            const res = await fetch(`${BACKEND_URL}/api/public/exams/${examId}`);
            examData = await res.json();
            
            document.getElementById("examTitle").innerText = examData.title || "JEE Mock Exam";
            document.getElementById("examUI").style.display = "flex";
            
            filterSubject('Physics');
            startTimer();
        } catch (err) { 
            alert("Error loading exam. Please check your connection."); 
        }
    };

    // --- Lightbox Functions ---
    function openLightbox(src) {
        document.getElementById("modalImg").src = src;
        document.getElementById("imageModal").style.display = "flex";
    }

    function closeLightbox(event) {
        // Only close if they clicked the background or the X button (not the image itself)
        if (event.target.id === "imageModal" || event.target.className === "close-modal") {
            document.getElementById("imageModal").style.display = "none";
            document.getElementById("modalImg").src = "";
        }
    }

    function filterSubject(sub) {
        currentSub = sub;
        document.querySelectorAll('.sub-btn').forEach(b => b.classList.toggle('active', b.innerText === sub));
        
        // Find the first question of this subject to display immediately
        let firstOfSub = -1;
        if (examData && examData.questions) {
            firstOfSub = examData.questions.findIndex(q => q.subject === sub);
        }
        
        if (firstOfSub !== -1) {
            showQuestion(firstOfSub);
        } else {
            // Handle case where subject has no questions yet
            document.getElementById("qNumber").innerText = sub;
            document.getElementById("qText").innerHTML = "<i>No questions available for this subject yet.</i>";
            document.getElementById("optionsList").innerHTML = "";
            currentIdx = -1;
            renderPalette();
        }
    }

    function showQuestion(index) {
        // Mark previous question as visited if left blank
        if (currentIdx !== -1 && !statusMap[currentIdx]) {
            statusMap[currentIdx] = 'visited'; 
        }
        
        currentIdx = index;
        const q = examData.questions[index];
        document.getElementById("qNumber").innerText = `Question ${index + 1} (${q.subject})`;
        
        // 1. Render Question Text AND Image (With Lightbox onClick)
        let qContent = q.question;
        if (q.questionImage) {
            qContent += `<br><img src="${q.questionImage}" class="exam-img" title="Click to enlarge" onclick="openLightbox(this.src)" alt="Question Graphic">`;
        }
        document.getElementById("qText").innerHTML = qContent;

        // 2. Render Options AND Option Images (With Lightbox onClick)
        const optDiv = document.getElementById("optionsList");
        if (q.options && q.options.length > 1) {
            let optionsHTML = "";
            
            q.options.forEach((opt, idx) => {
                let imgHTML = "";
                // If there's an image for this specific option, append it
                if (q.optionImages && q.optionImages[idx]) {
                    imgHTML = `<img src="${q.optionImages[idx]}" class="opt-img" title="Click to enlarge" onclick="openLightbox(this.src)" alt="Option ${idx + 1} Graphic">`;
                }
                
                const isChecked = studentAnswers[index] === opt ? 'checked' : '';
                optionsHTML += `
                    <div class="opt-row">
                        <label style="cursor: pointer; display: flex; align-items: center;">
                            <input type="radio" name="ans" value="${opt}" ${isChecked} style="margin-right: 15px; transform: scale(1.2);"> 
                            <span style="font-size: 16px;">${opt}</span>
                            ${imgHTML}
                        </label>
                    </div>`;
            });
            optDiv.innerHTML = optionsHTML;
        } else {
            // Numerical / Fill in the blank fallback
            optDiv.innerHTML = `<input type="number" id="numAns" value="${studentAnswers[index] || ''}" placeholder="Enter Value" style="padding: 10px; font-size: 16px; width: 200px;">`;
        }
        
        renderPalette();
    }

    function renderPalette() {
        const grid = document.getElementById("palette");
        if (!examData || !examData.questions) return;
        
        let paletteHTML = "";
        examData.questions.forEach((q, i) => {
            // Only show buttons for the currently selected subject
            if (q.subject === currentSub) {
                let cls = statusMap[i] || '';
                if (i === currentIdx) cls += ' active';
                // Using 'i' ensures we jump to the correct absolute index in the examData array
                paletteHTML += `<div class="p-btn ${cls}" onclick="showQuestion(${i})">${i + 1}</div>`;
            }
        });
        grid.innerHTML = paletteHTML;
    }

    function saveAndNext() {
        if (currentIdx === -1) return;
        
        const sel = document.querySelector('input[name="ans"]:checked') || document.getElementById("numAns");
        if (sel && sel.value) {
            studentAnswers[currentIdx] = sel.value;
            statusMap[currentIdx] = 'answered';
        } else {
            statusMap[currentIdx] = 'visited';
        }
        nextLogic();
    }

    function markForReview() {
        if (currentIdx === -1) return;
        
        const sel = document.querySelector('input[name="ans"]:checked') || document.getElementById("numAns");
        if (sel && sel.value) {
            studentAnswers[currentIdx] = sel.value;
            statusMap[currentIdx] = 'review-answered';
        } else {
            statusMap[currentIdx] = 'review';
        }
        nextLogic();
    }

    function nextLogic() {
        // Find the next question IN THE CURRENT SUBJECT
        let nextIdx = -1;
        for (let i = currentIdx + 1; i < examData.questions.length; i++) {
            if (examData.questions[i].subject === currentSub) {
                nextIdx = i;
                break;
            }
        }
        
        if (nextIdx !== -1) {
            showQuestion(nextIdx);
        } else {
            // If it was the last question of the subject, just refresh the palette
            renderPalette();
        }
    }

    function clearResponse() {
        if (currentIdx === -1) return;
        
        delete studentAnswers[currentIdx];
        statusMap[currentIdx] = 'visited'; // Revert to red (visited but not answered)
        
        // Uncheck radio buttons visually
        const radios = document.querySelectorAll('input[name="ans"]');
        radios.forEach(r => r.checked = false);
        
        // Clear numerical input if it exists
        const numInput = document.getElementById("numAns");
        if(numInput) numInput.value = "";
        
        renderPalette();
    }

    function startTimer() {
        const timerInterval = setInterval(() => {
            timeLeft--;
            let h = Math.floor(timeLeft / 3600), m = Math.floor((timeLeft % 3600) / 60), s = timeLeft % 60;
            document.getElementById("timer").innerText = `${h}:${m}:${s}`.replace(/\b\d\b/g, "0$&");
            
            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                submitFinal();
            }
        }, 1000);
    }

    async function submitFinal() {
        if (!confirm("Are you sure you want to submit the exam? You cannot change answers after this.")) return;
        
        let score = 0;
        examData.questions.forEach((q, i) => {
            if (studentAnswers[i] === q.correctAnswer) {
                score += 4; // +4 for correct
            } else if (studentAnswers[i]) {
                score -= 1; // -1 for incorrect
            }
            // 0 for unattempted
        });
        
        try {
            await fetch(`${BACKEND_URL}/api/public/submit`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ 
                    studentName: localStorage.getItem("userName") || "Guest Student", 
                    examTitle: examData.title, 
                    score: score 
                })
            });
            alert("Exam Submitted Successfully! Your Score: " + score);
            window.location.href = "student_portal.html";
        } catch (e) {
            alert("Error submitting exam. Please check your internet connection.");
        }
    }
</script>
</body>
</html>
